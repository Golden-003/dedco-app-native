<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      @keyframes breathe {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }
      .z-mark { animation: breathe 2.5s ease-in-out infinite; }
    </style>
  </defs>
  <!-- Solid amber background with rounded corners -->
  <rect width="64" height="64" rx="14" fill="#BF793B"/>
  
  <!-- The Z/Dedco mark (from original logo.svg, scaled to 64x64) -->
  <g class="z-mark" transform="scale(2.133) translate(0, 0)">
    <!-- Background shape from original (dark rounded rect) - skip, we use amber -->
    
    <!-- White Z mark paths from original logo -->
    <path fill="#FFFFFF" d="M15.47,7.1l-1.3,1.85c-0.2,0.29-0.54,0.47-0.9,0.47h-7.1V7.09C6.16,7.1,15.47,7.1,15.47,7.1z"/>
    <polygon fill="#FFFFFF" points="24.3,7.1 13.14,22.91 5.7,22.91 16.86,7.1"/>
    <path fill="#FFFFFF" d="M14.53,22.91l1.31-1.86c0.2-0.29,0.54-0.47,0.9-0.47h7.09v2.33H14.53z"/>
  </g>
  
  <!-- The "." dot in amber-pale, bottom right (like "Dedco.") -->
  <circle cx="52" cy="52" r="5" fill="#F5E6D3"/>
</svg>